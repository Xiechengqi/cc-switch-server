name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latest-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
            asset: cc-switch-server-linux-amd64
          - arch: arm64
            target: aarch64-unknown-linux-musl
            asset: cc-switch-server-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Export build metadata
        run: |
          {
            echo "CC_SWITCH_BUILD_COMMIT=$(git rev-parse HEAD)"
            echo "CC_SWITCH_BUILD_COMMIT_SHORT=$(git rev-parse --short=12 HEAD)"
            echo "CC_SWITCH_BUILD_COMMIT_MESSAGE=$(git log -1 --format=%s)"
            echo "CC_SWITCH_BUILD_COMMIT_TIME=$(git log -1 --format=%cI)"
            echo "CC_SWITCH_BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "CC_SWITCH_BUILD_TARGET=${{ matrix.target }}"
            echo "CC_SWITCH_BUILD_PROFILE=release"
            echo "CC_SWITCH_BUILD_RUSTC_VERSION=$(rustc --version)"
            echo "CC_SWITCH_BUILD_DIRTY=false"
          } >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Prepare release asset
        run: |
          cp "target/${{ matrix.target }}/release/cc-switch-server" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          ls -lh "${{ matrix.asset }}" "${{ matrix.asset }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Publish latest release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -maxdepth 2 -type f -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Collect release metadata
        id: metadata
        run: |
          VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          COMMIT_SHORT="$(git rev-parse --short=12 HEAD)"
          COMMIT_SUBJECT="$(git log -1 --format=%s)"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit_short=${COMMIT_SHORT}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          {
            echo "commit_subject<<EOF"
            echo "${COMMIT_SUBJECT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing latest release and tag
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${{ github.sha }}"
          git push -f origin latest

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ steps.metadata.outputs.version }})
          body: |
            ## Latest automatic build

            **Version**: ${{ steps.metadata.outputs.version }}
            **Commit**: `${{ github.sha }}`
            **Commit subject**: ${{ steps.metadata.outputs.commit_subject }}
            **Branch**: `${{ github.ref_name }}`
            **Build time**: `${{ steps.metadata.outputs.build_time }}`

            ### Downloads

            - Linux AMD64: `cc-switch-server-linux-amd64`
            - Linux ARM64: `cc-switch-server-linux-arm64`
            - SHA256 files are published next to each binary.

            ### Quick install

            ```bash
            # Linux AMD64
            curl -L https://github.com/${{ github.repository }}/releases/download/latest/cc-switch-server-linux-amd64 -o cc-switch-server
            chmod +x cc-switch-server

            # Linux ARM64
            curl -L https://github.com/${{ github.repository }}/releases/download/latest/cc-switch-server-linux-arm64 -o cc-switch-server
            chmod +x cc-switch-server
            ```
          files: release-files/*
          draft: false
          prerelease: false

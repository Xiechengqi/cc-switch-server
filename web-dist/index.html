<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cc-switch-server</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d9dde3;
      --text: #1f2328;
      --muted: #667085;
      --accent: #1769aa;
      --bad: #b42318;
      --good: #087443;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    main {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      min-height: calc(100vh - 52px);
    }
    nav {
      border-right: 1px solid var(--line);
      background: #fbfbfc;
      padding: 12px;
    }
	    nav button, button {
	      border: 1px solid var(--line);
	      background: #fff;
	      color: var(--text);
	      min-height: 34px;
      border-radius: 6px;
	      padding: 0 10px;
	      cursor: pointer;
	    }
	    button:disabled {
	      color: var(--muted);
	      background: #f1f3f5;
	      cursor: not-allowed;
	    }
    nav button {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
    }
    nav button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #eef6fd;
    }
    section { padding: 18px; }
    h1 { font-size: 17px; margin: 0; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .wide { grid-column: 1 / -1; }
    .compact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px 10px;
      align-items: end;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    label {
      display: block;
      color: var(--muted);
      margin: 8px 0 4px;
      font-size: 12px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 34px;
      padding: 7px 9px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 110px; resize: vertical; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    th { color: var(--muted); font-weight: 600; background: #fbfbfc; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .check-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
    .check-row label { display: inline-flex; align-items: center; gap: 6px; margin: 0; color: var(--text); }
    .check-row input { width: auto; min-height: 0; }
    .stack { display: grid; gap: 8px; }
    .small { font-size: 12px; }
    .muted { color: var(--muted); }
    .ok { color: var(--good); }
    .bad { color: var(--bad); }
    .hidden { display: none; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 12px;
    }
    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; }
      nav { border-right: 0; border-bottom: 1px solid var(--line); }
      nav button { display: inline-block; width: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>cc-switch-server</h1>
    <div class="row">
      <span id="sessionState" class="muted">未登录</span>
      <button id="refreshBtn">刷新</button>
    </div>
  </header>
  <main>
    <nav id="tabs"></nav>
    <section>
      <div id="setupView" class="panel hidden">
        <h2>首次设置</h2>
        <label>Password</label><input id="setupPassword" type="password">
        <label>Owner email</label><input id="setupEmail" type="email">
        <label>Router URL</label><input id="setupRouter" value="https://router.example.com">
        <label>Client tunnel subdomain</label><input id="setupSubdomain">
        <div style="height:10px"></div><button id="setupBtn">保存</button>
      </div>
      <div id="loginView" class="panel hidden">
        <h2>登录</h2>
        <label>Method</label>
        <select id="loginMethod"><option value="password">password</option><option value="api_token">api token</option><option value="email">email</option></select>
        <label>Password / API token / Email</label><input id="loginSecret" type="password">
        <div id="emailLoginFields" class="hidden">
          <label>Email code</label><input id="loginCode" inputmode="numeric" autocomplete="one-time-code">
          <div style="height:10px"></div><button id="requestEmailCodeBtn">发送验证码</button>
        </div>
        <div style="height:10px"></div><button id="loginBtn">登录</button>
      </div>
      <div id="appView" class="hidden">
        <div id="content"></div>
      </div>
      <div style="height:12px"></div>
      <div id="notice" class="muted"></div>
    </section>
  </main>
  <script>
    const tabs = ["Providers", "Universal", "Accounts", "Shares", "Usage", "Pricing", "Router", "Settings", "Failover", "Backup"];
    let token = localStorage.getItem("ccsToken") || "";
    let current = "Providers";
    let accountEditBase = null;
    let eventSource = null;
    let eventReloadTimer = null;
    const fallbackProviderTypesByApp = {
      claude: ["claude","claude_auth","claude_oauth","codex_oauth","gemini_cli","openrouter","github_copilot","deepseek_account","kiro_oauth","cursor_oauth","cursor_apikey","antigravity_oauth","agy_oauth","ollama_cloud","aws_bedrock","nvidia","deepseek_api"],
      codex: ["codex","codex_oauth","openrouter","cursor_oauth","cursor_apikey","ollama_cloud","nvidia","deepseek_api","claude","claude_auth","claude_oauth","gemini","gemini_cli"],
      gemini: ["gemini","gemini_cli","openrouter","antigravity_oauth","agy_oauth","claude","claude_auth","claude_oauth","codex","codex_oauth","nvidia","deepseek_api"]
    };
    const fallbackProviderLabels = {
      claude: "Claude API", claude_auth: "Claude bearer relay", claude_oauth: "Claude OAuth",
      codex: "OpenAI/Codex", codex_oauth: "OpenAI OAuth", gemini: "Gemini API", gemini_cli: "Gemini OAuth/CLI",
      openrouter: "OpenRouter", github_copilot: "GitHub Copilot", deepseek_account: "DeepSeek Account",
      kiro_oauth: "Kiro OAuth", cursor_oauth: "Cursor OAuth", cursor_apikey: "Cursor API Key",
      antigravity_oauth: "Antigravity OAuth", agy_oauth: "Antigravity CLI", ollama_cloud: "Ollama Cloud",
      aws_bedrock: "AWS Bedrock", nvidia: "Nvidia", deepseek_api: "DeepSeek API Key"
    };
    const fallbackProviderDefaults = {
      claude: {baseUrl:"https://api.anthropic.com", apiFormat:"anthropic", model:"claude-sonnet-4-6", key:"ANTHROPIC_API_KEY"},
      claude_auth: {baseUrl:"https://api.anthropic.com", apiFormat:"anthropic", model:"claude-sonnet-4-6", key:"ANTHROPIC_AUTH_TOKEN"},
      claude_oauth: {baseUrl:"https://api.anthropic.com", apiFormat:"anthropic", model:"claude-sonnet-4-6", key:"ANTHROPIC_AUTH_TOKEN"},
      codex: {baseUrl:"https://api.openai.com/v1", apiFormat:"openai_responses", model:"gpt-5.5", key:"OPENAI_API_KEY"},
      codex_oauth: {baseUrl:"https://chatgpt.com/backend-api/codex", apiFormat:"openai_responses", model:"gpt-5.5", key:"OPENAI_API_KEY"},
      gemini: {baseUrl:"https://generativelanguage.googleapis.com", apiFormat:"gemini_native", model:"gemini-3.5-flash", key:"GEMINI_API_KEY"},
      gemini_cli: {baseUrl:"https://generativelanguage.googleapis.com", apiFormat:"gemini_native", model:"gemini-3.5-flash", key:"GEMINI_API_KEY"},
      openrouter: {baseUrl:"https://openrouter.ai/api", apiFormat:"openai_chat", model:"openrouter/auto", key:"API_KEY"},
      github_copilot: {baseUrl:"https://api.githubcopilot.com", apiFormat:"openai_chat", model:"gpt-5.5", key:"ANTHROPIC_AUTH_TOKEN"},
      deepseek_account: {baseUrl:"https://chat.deepseek.com", apiFormat:"anthropic", model:"deepseek-v4-pro", key:"ANTHROPIC_AUTH_TOKEN"},
      kiro_oauth: {baseUrl:"https://q.us-east-1.amazonaws.com", apiFormat:"anthropic", model:"claude-sonnet-4-8", key:"ANTHROPIC_AUTH_TOKEN"},
      cursor_oauth: {baseUrl:"https://api2.cursor.sh", apiFormat:"openai_chat", model:"composer-2.5", key:"ANTHROPIC_AUTH_TOKEN"},
      cursor_apikey: {baseUrl:"https://api.cursor.com", apiFormat:"openai_chat", model:"composer-2.5", key:"ANTHROPIC_AUTH_TOKEN"},
      antigravity_oauth: {baseUrl:"https://daily-cloudcode-pa.googleapis.com", apiFormat:"gemini_native", model:"gemini-3.5-flash-medium", key:"GEMINI_API_KEY"},
      agy_oauth: {baseUrl:"https://daily-cloudcode-pa.googleapis.com", apiFormat:"gemini_native", model:"gemini-3.5-flash-medium", key:"GEMINI_API_KEY"},
      ollama_cloud: {baseUrl:"https://ollama.com", apiFormat:"openai_chat", model:"gpt-oss:20b", key:"OPENAI_API_KEY"},
      aws_bedrock: {baseUrl:"https://bedrock-runtime.${AWS_REGION}.amazonaws.com", apiFormat:"anthropic", model:"global.anthropic.claude-opus-4-8", key:"AWS_ACCESS_KEY_ID"},
      nvidia: {baseUrl:"https://integrate.api.nvidia.com/v1", apiFormat:"openai_chat", model:"moonshotai/kimi-k2.5", key:"OPENAI_API_KEY"},
      deepseek_api: {baseUrl:"https://api.deepseek.com", apiFormat:"openai_chat", model:"deepseek-v4-flash", key:"OPENAI_API_KEY"}
    };
    const fallbackProviderTemplateEnv = {
      claude: ["ANTHROPIC_BASE_URL","ANTHROPIC_API_KEY","ANTHROPIC_MODEL","ANTHROPIC_DEFAULT_HAIKU_MODEL","ANTHROPIC_DEFAULT_SONNET_MODEL","ANTHROPIC_DEFAULT_OPUS_MODEL"],
      claude_auth: ["ANTHROPIC_BASE_URL","ANTHROPIC_AUTH_TOKEN","ANTHROPIC_MODEL","ANTHROPIC_DEFAULT_HAIKU_MODEL","ANTHROPIC_DEFAULT_SONNET_MODEL","ANTHROPIC_DEFAULT_OPUS_MODEL"],
      claude_oauth: ["ANTHROPIC_BASE_URL","ANTHROPIC_AUTH_TOKEN","ANTHROPIC_MODEL","ANTHROPIC_DEFAULT_HAIKU_MODEL","ANTHROPIC_DEFAULT_SONNET_MODEL","ANTHROPIC_DEFAULT_OPUS_MODEL"],
      codex: ["OPENAI_BASE_URL","OPENAI_API_KEY"],
      codex_oauth: ["OPENAI_BASE_URL","OPENAI_API_KEY"],
      gemini: ["GOOGLE_GEMINI_BASE_URL","GEMINI_API_KEY","GEMINI_MODEL"],
      gemini_cli: ["GOOGLE_GEMINI_BASE_URL","GEMINI_API_KEY","GEMINI_MODEL"],
      openrouter: ["OPENAI_BASE_URL","OPENAI_API_KEY"],
      github_copilot: ["ANTHROPIC_AUTH_TOKEN"],
      deepseek_account: ["ANTHROPIC_AUTH_TOKEN"],
      kiro_oauth: ["ANTHROPIC_AUTH_TOKEN"],
      cursor_oauth: ["OPENAI_BASE_URL","ANTHROPIC_AUTH_TOKEN"],
      cursor_apikey: ["OPENAI_BASE_URL","ANTHROPIC_AUTH_TOKEN"],
      antigravity_oauth: ["GOOGLE_GEMINI_BASE_URL","GEMINI_API_KEY","GEMINI_MODEL"],
      agy_oauth: ["GOOGLE_GEMINI_BASE_URL","GEMINI_API_KEY","GEMINI_MODEL"],
      ollama_cloud: ["OPENAI_BASE_URL","OPENAI_API_KEY"],
      aws_bedrock: ["AWS_REGION","AWS_ACCESS_KEY_ID","AWS_SECRET_ACCESS_KEY","AWS_SESSION_TOKEN","CLAUDE_CODE_USE_BEDROCK"],
      nvidia: ["OPENAI_BASE_URL","OPENAI_API_KEY"],
      deepseek_api: ["OPENAI_BASE_URL","OPENAI_API_KEY"]
    };
    let providerTypesByApp = cloneConfig(fallbackProviderTypesByApp);
    let providerLabels = cloneConfig(fallbackProviderLabels);
    let providerDefaults = cloneConfig(fallbackProviderDefaults);
    let providerTemplateEnv = cloneConfig(fallbackProviderTemplateEnv);
    let providerMatrixCache = null;
    let providerMatrixEntriesByKey = {};

    const api = async (path, options = {}) => {
      const headers = Object.assign({"content-type": "application/json"}, options.headers || {});
      if (token) headers.authorization = "Bearer " + token;
      const res = await fetch(path, Object.assign({}, options, {headers}));
      const text = await res.text();
      const data = text ? JSON.parse(text) : {};
      if (!res.ok) throw new Error(data.error || data.message || text || res.statusText);
      return data;
    };
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const notice = (msg, bad=false) => {
      const el = document.getElementById("notice");
      el.className = bad ? "bad" : "muted";
      el.textContent = msg;
    };
    async function copyText(text) {
      if (navigator.clipboard?.writeText) {
        try { await navigator.clipboard.writeText(text); } catch (_) {}
      }
    }
    function cloneConfig(value) {
      return JSON.parse(JSON.stringify(value));
    }
    async function loadProviderMatrix() {
      if (providerMatrixCache) return providerMatrixCache;
      try {
        const matrix = await api("/api/provider-matrix");
        applyProviderMatrix(matrix);
        return providerMatrixCache;
      } catch (e) {
        providerMatrixCache = {ok: false, entries: [], providerTypes: [], summary: null, error: e.message};
        return providerMatrixCache;
      }
    }
    function applyProviderMatrix(matrix) {
      if (!matrix || !Array.isArray(matrix.entries) || !matrix.entries.length) return;
      providerMatrixCache = matrix;
      providerTypesByApp = {};
      providerLabels = {};
      providerDefaults = {};
      providerTemplateEnv = {};
      providerMatrixEntriesByKey = {};
      for (const entry of matrix.entries) {
        providerMatrixEntriesByKey[capabilityKey(entry.app, entry.providerType)] = entry;
        if (entry.uiVisible) {
          (providerTypesByApp[entry.app] ||= []).push(entry.providerType);
        }
      }
      for (const item of matrix.providerTypes || []) {
        const type = item.providerType;
        providerLabels[type] = item.label || type;
        providerDefaults[type] = item.defaults || {};
        providerTemplateEnv[type] = item.templateEnv || [];
      }
      for (const [app, types] of Object.entries(providerTypesByApp)) {
        providerTypesByApp[app] = [...new Set(types)];
      }
    }
    function providerMatrixEntry(app, providerType) {
      return providerMatrixEntriesByKey[capabilityKey(app, providerType)] || null;
    }

    async function init() {
      renderTabs();
      document.getElementById("refreshBtn").onclick = load;
      document.getElementById("setupBtn").onclick = setup;
      document.getElementById("loginBtn").onclick = login;
      document.getElementById("requestEmailCodeBtn").onclick = requestEmailCode;
      document.getElementById("loginMethod").onchange = updateLoginControls;
      updateLoginControls();
      await load();
    }
    function renderTabs() {
      document.getElementById("tabs").innerHTML = tabs.map(tab => `<button data-tab="${tab}" class="${tab===current?'active':''}">${tab}</button>`).join("");
      document.querySelectorAll("[data-tab]").forEach(btn => btn.onclick = () => { current = btn.dataset.tab; renderTabs(); loadApp(); });
    }
    async function load() {
      try {
        const status = await api("/api/setup/status", {headers: {}});
        document.getElementById("setupView").classList.toggle("hidden", !status.needsSetup);
        document.getElementById("loginView").classList.toggle("hidden", status.needsSetup || !!token);
        document.getElementById("appView").classList.toggle("hidden", status.needsSetup || !token);
        document.getElementById("sessionState").textContent = token ? "已登录" : "未登录";
        if (!status.needsSetup && token) {
          connectEvents();
          await loadApp();
        } else {
          disconnectEvents();
        }
      } catch (e) { notice(e.message, true); }
    }
    async function setup() {
      try {
        await api("/api/setup", {method:"POST", body: JSON.stringify({
          password: setupPassword.value,
          ownerEmail: setupEmail.value,
          routerUrl: setupRouter.value,
          clientTunnelSubdomain: setupSubdomain.value
        })});
        notice("setup complete");
        await load();
      } catch (e) { notice(e.message, true); }
    }
    async function login() {
      try {
        const method = loginMethod.value;
        if (method === "email") {
          const res = await api("/api/auth/email/verify-code", {method:"POST", body: JSON.stringify({email: loginSecret.value, code: loginCode.value})});
          token = res.token;
          localStorage.setItem("ccsToken", token);
          await load();
          return;
        }
        const body = {method};
        if (method === "password") body.password = loginSecret.value;
        if (method === "api_token") body.apiToken = loginSecret.value;
        const res = await api("/api/auth/login", {method:"POST", body: JSON.stringify(body)});
        token = res.token;
        localStorage.setItem("ccsToken", token);
        await load();
      } catch (e) { notice(e.message, true); }
    }
    async function requestEmailCode() {
      try {
        const res = await api("/api/auth/email/request-code", {method:"POST", body: JSON.stringify({email: loginSecret.value})});
        notice(`code sent to ${res.maskedDestination || "email"}`);
      } catch (e) { notice(e.message, true); }
    }
    function updateLoginControls() {
      const isEmail = loginMethod.value === "email";
      emailLoginFields.classList.toggle("hidden", !isEmail);
      loginSecret.type = isEmail ? "email" : "password";
    }
    function connectEvents() {
      if (!token || eventSource) return;
      eventSource = new EventSource(`/api/events?token=${encodeURIComponent(token)}`);
      eventSource.onmessage = event => handleServerEvent(event);
      ["usage.created","usage.updated","share.changed","share.deleted","share.imported","tunnel.changed","backup.created","backup.restored"].forEach(type => {
        eventSource.addEventListener(type, event => handleServerEvent(event));
      });
      eventSource.onerror = () => {
        if (eventSource && eventSource.readyState === EventSource.CLOSED) {
          disconnectEvents();
        }
      };
    }
    function disconnectEvents() {
      if (eventSource) eventSource.close();
      eventSource = null;
      if (eventReloadTimer) clearTimeout(eventReloadTimer);
      eventReloadTimer = null;
    }
    function handleServerEvent(event) {
      let payload = {};
      try { payload = JSON.parse(event.data || "{}"); } catch (_) {}
      const type = payload.eventType || event.type || "";
      if (!type || type === "message") return;
      const shouldRefresh =
        (type.startsWith("usage.") && current === "Usage") ||
        (type.startsWith("share.") && current === "Shares") ||
        (type.startsWith("tunnel.") && (current === "Router" || current === "Shares" || current === "Settings")) ||
        (type.startsWith("backup.") && current === "Backup");
      if (!shouldRefresh) return;
      if (eventReloadTimer) clearTimeout(eventReloadTimer);
      eventReloadTimer = setTimeout(() => {
        eventReloadTimer = null;
        loadApp().catch(e => notice(e.message, true));
      }, 300);
    }
    async function loadApp() {
      const loaders = {Providers: loadProviders, Universal: loadUniversalProviders, Accounts: loadAccounts, Shares: loadShares, Usage: loadUsage, Pricing: loadPricing, Router: loadRouter, Settings: loadSettings, Failover: loadFailover, Backup: loadBackups};
      await loaders[current]();
    }
    async function loadProviders() {
      const app = document.getElementById("providerFilter")?.value || "claude";
      const [matrix, providers, health, presets, proxyCaps, accountCaps] = await Promise.all([loadProviderMatrix(), api(`/api/providers?app=${app}`), api(`/api/providers/health?app=${app}`), api(`/api/provider-presets?app=${app}`), api("/api/proxy/capabilities"), api("/api/accounts/capabilities")]);
      const healthById = Object.fromEntries(health.providers.map(item => [item.providerId, item]));
      const proxyCapByKey = Object.fromEntries((proxyCaps.capabilities || []).map(item => [capabilityKey(item.app, item.providerType), item]));
      const accountCapByType = Object.fromEntries((accountCaps.capabilities || []).map(item => [item.providerType, item]));
      const matrixWarning = matrix?.ok === false ? `<div class="bad">provider matrix API unavailable; using static fallback</div>` : "";
      content.innerHTML = `<div class="grid"><div class="panel wide"><h2>Provider</h2>
        ${matrixWarning}
        <div class="compact-grid">
          <div><label>App</label><select id="providerApp"><option ${app==="claude"?"selected":""}>claude</option><option ${app==="codex"?"selected":""}>codex</option><option ${app==="gemini"?"selected":""}>gemini</option></select></div>
          <div><label>Provider type</label><select id="providerType">${providerTypeOptions(app)}</select></div>
          <div><label>ID</label><input id="providerId"></div>
          <div><label>Name</label><input id="providerName"></div>
          <div><label>Category</label><input id="providerCategory" placeholder="official / aggregator"></div>
          <div><label>API format</label><select id="providerApiFormat"><option value="">auto</option><option value="anthropic">anthropic</option><option value="openai_chat">openai_chat</option><option value="openai_responses">openai_responses</option><option value="gemini_native">gemini_native</option></select></div>
          <div><label>Base URL</label><input id="providerBaseUrl"></div>
          <div><label>API key</label><input id="providerApiKey" type="password"></div>
          <div><label>API key field</label><select id="providerApiKeyField"><option>auto</option><option>ANTHROPIC_AUTH_TOKEN</option><option>ANTHROPIC_API_KEY</option><option>OPENAI_API_KEY</option><option>GEMINI_API_KEY</option><option>GOOGLE_API_KEY</option><option>AWS_ACCESS_KEY_ID</option></select></div>
          <div><label>AWS region</label><input id="providerAwsRegion"></div>
          <div><label>AWS secret key</label><input id="providerAwsSecret" type="password"></div>
          <div><label>AWS session token</label><input id="providerAwsSession" type="password"></div>
          <div><label>Model</label><input id="providerModel"></div>
          <div><label>Upstream model</label><input id="providerUpstreamModel"></div>
          <div><label>Test model</label><input id="providerTestModel"></div>
          <div><label>Network test</label><select id="providerNetworkTest"><option value="false">config only</option><option value="true">network</option></select></div>
          <div><label>Stream test</label><input id="providerStreamTest" type="checkbox"></div>
          <div><label>Codex effort</label><select id="providerCodexEffort"><option value="">auto</option><option>minimal</option><option>low</option><option>medium</option><option>high</option><option>xhigh</option></select></div>
          <div><label>Auth provider</label><input id="providerAuthProvider"></div>
          <div><label>Account ID</label><input id="providerAccountId"></div>
          <div><label>Cost multiplier</label><input id="providerCostMultiplier"></div>
          <div><label>Quota dispatch %</label><input id="providerQuotaPercent" type="number" min="0" max="100"></div>
          <div><label>Custom User-Agent</label><input id="providerUserAgent"></div>
          <div><label>Prompt cache key</label><input id="providerPromptCacheKey"></div>
        </div>
        <div class="check-row">
          <label><input id="providerCodexFast" type="checkbox">Codex fast</label>
          <label><input id="providerCodexImage" type="checkbox">Codex image</label>

        providerType: accountType.value,
        email: accountEmail.value.trim() || undefined,
        accessToken: accountToken.value.trim() || undefined,
        refreshToken: accountRefreshToken.value.trim() || undefined,
        idToken: accountIdToken.value.trim() || undefined,
        apiKey: accountApiKey.value.trim() || undefined,
        scopes: textToList(accountScopes.value),
        profile: emptyObjectToUndefined(parseJson(accountProfileJson.value, {})),
        raw: emptyObjectToUndefined(parseJson(accountRawJson.value, {})),
        subscriptionLevel: accountSubscription.value.trim() || undefined,
        quotaPercent: numberOrUndefined(accountQuotaPercent.value),
        quota: emptyObjectToUndefined(parseJson(accountQuotaJson.value, {})),
        expiresAt: numberOrUndefined(accountExpiresAt.value)
      });
      if (accountEditBase && accountEditBase.id === patch.id) {
        return Object.assign({}, accountEditBase, patch);
      }
      return patch;
    }
    function accountCredentialText(account) {
      const parts = [];
      if (account.accessToken) parts.push("access");
      if (account.refreshToken) parts.push("refresh");
      if (account.idToken) parts.push("id");
      if (account.apiKey) parts.push("api_key");
      return parts.join(", ");
    }
    function accountRefreshStateText(account, cap) {
      if (!cap?.supportsRefresh) return cap?.supportsRefreshPlan ? "plan only" : "disabled";
      if (!account.refreshToken) return "missing refreshToken";
      if (!account.accessToken) return "ready";
      const expiresAt = Number(account.expiresAt);
      if (!Number.isFinite(expiresAt) || expiresAt <= 0) return "ready";
      const remainingMs = expiresAt - Date.now();
      if (remainingMs <= 0) return "expired";
      if (remainingMs <= 60 * 1000) return "expires soon";
      return "ready";
    }
    function accountQuotaText(account) {
      const details = [];
      const subscriptionEnd = accountQuotaSubscriptionEnd(account);
      if (subscriptionEnd) details.push(`sub until ${formatDateish(subscriptionEnd)}`);
      const bankedReset = accountQuotaBankedResetText(account);
      if (bankedReset) details.push(bankedReset);
      const suffix = details.length ? ` (${details.join("; ")})` : "";
      if (account.quotaPercent !== undefined && account.quotaPercent !== null) return `${account.quotaPercent}%${suffix}`;
      const tiers = account.quota?.tiers || [];
      const body = tiers.map(tier => `${tier.name}:${tier.utilization ?? tier.used ?? ""}`).join(", ");
      return body ? `${body}${suffix}` : suffix.trim();
    }
    function accountQuotaSubscriptionEnd(account) {
      const extra = account.quota?.extraUsage || {};
      return extra.subscriptionPeriodEnd || extra.subscription?.expiresAt || extra.raw?.SubscriptionPeriodEnd?.Time || extra.raw?.subscriptionPeriodEnd?.time || "";
    }
    function accountQuotaBankedResetText(account) {
      const extra = account.quota?.extraUsage || {};
      const reset = extra.bankedReset || extra.codexBankedReset || account.raw?.bankedReset || account.raw?.codexBankedReset;
      if (!reset || typeof reset !== "object") return "";
      const count = reset.availableCount ?? reset.available_count ?? reset.available;
      const countText = count !== undefined && count !== null && count !== "" ? String(count) : "";
      const next = reset.nextExpiresAt || reset.next_expires_at || reset.expiresAt || reset.expires_at;
      const parts = [`banked reset${countText ? ` ${countText}` : ""}`];
      if (next) parts.push(`until ${formatDateish(next)}`);
      return parts.join(" ");
    }
    function formatDateish(value) {
      if (!value) return "";
      if (typeof value === "number") return formatTs(value);
      const ms = Date.parse(value);
      return Number.isFinite(ms) ? new Date(ms).toISOString() : String(value);
    }
    function jsonPreview(value) {
      if (!value) return "";
      const text = JSON.stringify(value);
      return text.length > 160 ? text.slice(0, 160) + "..." : text;
    }
    function listText(value) {
      return (value || []).join(", ");
    }
    function formatTs(value) {
      if (!value) return "";
      const ms = Number(value);
      if (!Number.isFinite(ms)) return String(value);
      return new Date(ms).toISOString();
    }
    function numberText(value) {
      if (value === null || value === undefined || value === "") return "";
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(1) : String(value);
    }
    function usdText(value) {
      if (value === null || value === undefined || value === "") return "";
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(6) : String(value);
    }
    function buildPricingPayload() {
      return {
        modelId: pricingModelId.value.trim(),
        displayName: pricingDisplayName.value.trim(),
        inputCostPerMillion: pricingInput.value.trim(),
        outputCostPerMillion: pricingOutput.value.trim(),
        cacheReadCostPerMillion: pricingCacheRead.value.trim(),
        cacheCreationCostPerMillion: pricingCacheCreate.value.trim()
      };
    }
    function fillPricingForm(model) {
      pricingModelId.value = model.modelId || "";
      pricingDisplayName.value = model.displayName || "";
      pricingInput.value = model.inputCostPerMillion || "";
      pricingOutput.value = model.outputCostPerMillion || "";
      pricingCacheRead.value = model.cacheReadCostPerMillion || "";
      pricingCacheCreate.value = model.cacheCreationCostPerMillion || "";
    }
    function limitCostText(usage, limit, exceeded) {
      const usageText = usdText(usage);
      const limitTextValue = limit === null || limit === undefined ? "" : usdText(limit);
      const body = limitTextValue ? `${usageText} / ${limitTextValue}` : usageText;
      return exceeded ? `${body} exceeded` : body;
    }
    function quotaLimitText(limit) {
      const quota = limit.accountQuotaPercent === null || limit.accountQuotaPercent === undefined ? "" : `${numberText(limit.accountQuotaPercent)}%`;
      const dispatch = limit.quotaDispatchLimitPercent === null || limit.quotaDispatchLimitPercent === undefined ? "" : `limit ${numberText(limit.quotaDispatchLimitPercent)}%`;
      const body = [quota, dispatch].filter(Boolean).join(" / ");
      return limit.quotaDispatchExceeded && body ? `${body} exceeded` : body;
    }
    function shareLimitText(shares) {
      return (shares || []).map(share => {
        const token = share.tokenLimit ? `${share.tokensUsed}/${share.tokenLimit}` : String(share.tokensUsed || 0);
        const flags = (share.warnings || []).join(",");
        return `${share.shareName}:${share.status} tokens ${token}${share.parallelLimit ? ` parallel ${share.parallelLimit}` : ""}${flags ? ` ${flags}` : ""}`;
      }).join("; ");
    }
	    function yesNo(value) {
	      return value ? "yes" : "";
	    }
	    function capabilityYesNo(value, support) {
	      if (value) return "yes";
	      return support === "planned" ? "planned" : "";
	    }
	    function adapterSupportText(cap) {
	      if (!cap || !cap.support) return "";
	      const flags = [];
	      if (cap.requiresTransform) flags.push("transform");
	      if (cap.supportsStreamUsage) flags.push("stream");
	      if (cap.supportsModelList) flags.push("models");
	      return [cap.support, flags.length ? `(${flags.join(", ")})` : ""].filter(Boolean).join(" ");
	    }
	    function providerReadinessText(cap, accountCap, matrixEntry = {}) {
	      if (!cap && !accountCap) return "";
	      const flags = [];
	      if (cap?.support === "native") flags.push(cap.requiresTransform ? "static contract" : "native adapter");
	      if (cap?.support === "generic_fallback") flags.push("fallback adapter");
	      if (cap?.support === "planned") flags.push("planned upstream");
	      if (matrixEntry.visibility === "diagnostic_only") flags.push("diagnostic only");
	      if (matrixEntry.directConfigSupported) flags.push("direct config");
	      if (matrixEntry.managedAccountRecommended) flags.push("managed account suggested");
	      if (accountCap?.support === "manual_token_store") {
	        flags.push(accountCap.supportsRefresh ? "manual refresh-token import" : "manual token required");
	      }
	      if (accountCap?.supportsRefresh) flags.push("native refresh/profile");
	      else if (accountCap?.supportsRefreshPlan) flags.push("refresh plan only");
	      else if (accountCap) flags.push("refresh disabled");
	      return flags.join(", ");
	    }
	    function providerNextStepText(cap, accountCap, matrixEntry = {}, provider = {}) {
	      const notes = [];
	      if (matrixEntry.note) notes.push(matrixEntry.note);
	      if (cap?.support === "planned") notes.push("complete native upstream implementation");
	      if (cap?.support === "generic_fallback") notes.push("confirm upstream protocol and add static contract");
	      if (provider.meta?.usageScript || provider.meta?.usage_script) notes.push("usage script is desktop-only");
	      if (accountCap?.supportsRefresh) {
	        notes.push("import accessToken and refreshToken; login request preview only");
	      } else if (accountCap?.blockingReason) {
	        notes.push(accountCap.blockingReason);
	      }
	      return [...new Set(notes.filter(Boolean))].join("; ");
	    }
	    function accountCapabilityText(cap) {
	      if (!cap) return "";
	      const flags = [];
	      if (cap.supportsRefreshPlan && !cap.supportsRefresh) flags.push("plan only");
	      if (cap.supportsRefresh) flags.push("native refresh");
	      if (cap.supportsQuota) flags.push("quota");
	      if (cap.serverNativeStage && !cap.supportsStartLogin) flags.push("login off");
	      if (cap.blockingReason && !cap.supportsRefresh) flags.push("blocked");
	      return [cap.status || cap.support || "", flags.length ? `(${flags.join(", ")})` : ""].filter(Boolean).join(" ");
	    }
	    function disabledAttr(disabled, reason) {
	      return disabled ? ` disabled title="${esc(reason)}"` : "";
	    }
	    function providerActionButtons(providers, proxyCapByKey) {
	      return providers.map(p => {
	        const cap = proxyCapByKey[capabilityKey(p.app, p.providerType)] || {};
	        const planned = cap.support === "planned";
	        return `<button data-edit-provider="${esc(p.provider.id)}">编辑 ${esc(p.provider.name)}</button><button data-test-provider="${esc(p.provider.id)}"${disabledAttr(planned, "adapter is planned")}>测试 ${esc(p.provider.name)}</button><button data-fetch-models="${esc(p.provider.id)}"${disabledAttr(planned, "adapter is planned")}>拉取模型 ${esc(p.provider.name)}</button>`;
	      }).join("");
	    }
	    function accountActionButtons(accounts, capabilityByType) {
	      return accounts.map(a => {
	        const cap = capabilityByType[a.providerType] || {};
	        const hasRefreshToken = Boolean(String(a.refreshToken || "").trim());
	        const refreshDisabled = !cap.supportsRefresh || !hasRefreshToken;
	        const refreshDisabledReason = !cap.supportsRefresh ? "native refresh is disabled" : "refreshToken is required";
	        return [
	          `<button data-edit-account="${esc(a.id)}">编辑 ${esc(a.id)}</button>`,
	          `<button data-refresh-account="${esc(a.id)}"${disabledAttr(refreshDisabled, refreshDisabledReason)}>刷新 ${esc(a.id)}</button>`,
	          `<button data-refresh-plan-account="${esc(a.id)}"${disabledAttr(!cap.supportsRefreshPlan, "refresh plan unavailable")}>Refresh plan ${esc(a.id)}</button>`,
	          `<button data-quota-account="${esc(a.id)}"${disabledAttr(!cap.supportsQuota, "quota fetch is disabled")}>Quota ${esc(a.id)}</button>`,
	          `<button data-delete-account="${esc(a.id)}">删除 ${esc(a.id)}</button>`
	        ].join("");
	      }).join("");
	    }
	    function capabilityKey(app, providerType) {
	      return `${app}:${providerType}`;
	    }
    function table(headers, rows) {
      return `<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    }
    function accountBindingText(provider) {
      const binding = provider?.meta?.authBinding;
      if (!binding) return "";
      return [binding.authProvider, binding.accountId].filter(Boolean).join(" / ");
    }
    function modelListText(provider) {
      const config = provider?.settingsConfig || {};
      const env = config.env || {};
      const candidates = [
        config.models,
        config.modelList,
        config.availableModels,
        config.modelCatalog && Object.keys(config.modelCatalog),
        config.modelMapping && Object.keys(config.modelMapping),
        [env.ANTHROPIC_MODEL, env.GEMINI_MODEL].filter(Boolean)
      ];
      const models = candidates.find(value => Array.isArray(value) && value.length);
      return models ? models.join(", ") : "";
    }
    function providerHealthText(health) {
      if (!health) return "unknown";
      const status = health.healthy ? "healthy" : "unhealthy";
      const rate = health.successRate === null || health.successRate === undefined ? "" : ` ${numberText(health.successRate * 100)}%`;
      const code = health.lastStatusCode ? ` ${health.lastStatusCode}` : "";
      const reason = health.reason ? ` ${health.reason}` : "";
      return `${status}${rate}${code}${reason}`;
    }
    function modelFromProvider(provider) {
      const config = provider?.settingsConfig || {};
      const env = config.env || {};
      const firstModel = Array.isArray(config.models) ? config.models[0] : null;
      const modelName = typeof firstModel === "string" ? firstModel : (firstModel?.id || firstModel?.name || "");
      return env.ANTHROPIC_MODEL || env.GEMINI_MODEL || modelName || config.modelMapping?.upstreamModel || "";
    }
    function providerBaseUrlText(provider) {
      const config = provider?.settingsConfig || {};
      const env = config.env || {};
      return env.ANTHROPIC_BASE_URL || env.OPENAI_BASE_URL || env.CODEX_BASE_URL || env.GOOGLE_GEMINI_BASE_URL || env.GEMINI_BASE_URL || config.BASE_URL || config.base_url || "";
    }
    function universalModelsText(provider) {
      return [provider.models?.claude?.model, provider.models?.codex?.model, provider.models?.gemini?.model].filter(Boolean).join(", ");
    }
    function bindingText(share) {
      return (share.bindings || []).map(item => `${item.app}:${item.providerId}`).join(", ");
    }
    function marketGrantText(grant) {
      if (!grant) return "";
      return [grant.status, grant.grantId, grant.lastError].filter(Boolean).join(" ");
    }
    function shareModelHealthText(share) {
      const health = share.runtimeSnapshot?.modelHealth || {};
      return ["claude","codex","gemini"].flatMap(app => (health[app] || []).map(item => {
        const code = item.statusCode ? ` ${item.statusCode}` : "";
        const model = item.actualModel || item.requestedModel || "";
        const source = item.source ? ` ${item.source}` : "";
        return `${app}:${item.status || "unknown"}${code}${model ? ` ${model}` : ""}${source}`;
      })).join(", ");
    }
    init();
  </script>
</body>
</html>
